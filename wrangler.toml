name = "event-registration"
compatibility_date = "2025-05-05"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# OpenNext が内部で Worker 自身にリクエストを転送するために必須（未設定だとルート等で 404 になる）
[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "event-registration"

[[d1_databases]]
binding = "DB"
database_name = "event-registration-db"
database_id = "33f750e6-a120-410c-af39-e3e5d23b5576"

# Cron は GitHub Actions (.github/workflows/email-schedule.yml) で管理
# wrangler の scheduled ハンドラーは OpenNext.js が未対応のため使用しない

[vars]
NEXT_PUBLIC_APP_URL = "https://events.allianceforum.org"
RESEND_FROM_EMAIL = "noreply@events.allianceforum.org"
